# =========================================================================
# explore_lite 参数 (与 leo_sim_nav 的 SLAM + Nav2 配合，探索完成后回起点并等待目标)
# =========================================================================

/**:
  ros__parameters:
    use_sim_time: True
    # 与 nav2 / slam_toolbox 一致
    robot_base_frame: base_footprint
    # 探索结束后回到起点，然后不再发目标，由 RViz/Nav2 接收外部目标
    return_to_init: true
    # 使用 SLAM 发布的 /map（与 Nav2 global costmap 一致）
    costmap_topic: map
    costmap_updates_topic: map_updates
    visualize: true
    planner_frequency: 0.15
    progress_timeout: 30.0
    potential_scale: 3.0
    orientation_scale: 0.0
    gain_scale: 1.0
    transform_tolerance: 0.5
    min_frontier_size: 0.75
